<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project One - Interface</title>
    
    <style>
      :root {
        --bg-primary: #0a0d14 !important;
        --bg-secondary: #111622 !important;
        --bg-panel: #161f30 !important;
        --border-color: rgba(255, 255, 255, 0.1) !important;
        --text-primary: #f1f5f9 !important;
        --text-secondary: #94a3b8 !important;
        --accent-blue: #00e5ff !important;
        --accent-gold: #d6af37 !important;
        --status-success: #10b981 !important;
        --status-danger: #ef4444 !important;
      }

      html, body {
        background-color: #0a0d14 !important;
        color: #f1f5f9 !important;
        margin: 0;
        padding: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }

      /* Style fix for text inputs and dropdown select menus */
      input, select {
        background-color: #05070a !important;
        color: #f1f5f9 !important;
        border: 1px solid rgba(255, 255, 255, 0.15) !important;
        padding: 0.65rem 1rem !important;
        border-radius: 4px !important;
      }

      /* Base spacing utility fixes */
      .mono-text {
        font-family: 'SFMono-Regular', Consolas, monospace !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
